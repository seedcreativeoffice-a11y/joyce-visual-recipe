// ═══ Audio ═══════════════════════════════════
let AC=null;
const ac=()=>{if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;};
function tone(f,d,t="sine",v=.1){try{const c=ac();if(c.state==="suspended")c.resume();const o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.value=f;o.connect(g);g.connect(c.destination);const n=c.currentTime;g.gain.setValueAtTime(0,n);g.gain.linearRampToValueAtTime(v,n+.01);g.gain.exponentialRampToValueAtTime(.0001,n+d);o.start(n);o.stop(n+d+.02);}catch(e){}}
const sfx={
  click:()=>tone(660,.07,"triangle",.09),
  reveal:()=>{[520,660,780].forEach((f,i)=>setTimeout(()=>tone(f,.16,"sine",.09),i*75));},
  copy:()=>{[600,750,900,1100].forEach((f,i)=>setTimeout(()=>tone(f,.11,"triangle",.09),i*60));},
  save:()=>{[880,1100].forEach((f,i)=>setTimeout(()=>tone(f,.14,"sine",.1),i*90));}
};

// ═══ Copy ════════════════════════════════════
async function copyText(txt){
  let ok=false;
  try{await navigator.clipboard.writeText(txt);ok=true;}catch(e){}
  if(!ok){try{const t=document.createElement("textarea");t.value=txt;t.style.cssText="position:fixed;opacity:0";document.body.appendChild(t);t.select();ok=document.execCommand("copy");document.body.removeChild(t);}catch(e){}}
  if(ok){sfx.copy();set({copied:true});setTimeout(()=>set({copied:false}),2200);}
}

      <div style="display:flex;background:#fff;border:1.5px solid ${T.border};border-radius:9px;padding:3px;gap:2px;box-shadow:0 1px 4px rgba(0,0,0,.05)">
        ${["zh","en"].map(l=>`<button class="lang-btn" data-lang="${l}"
          style="padding:5px 12px;border-radius:6px;border:none;font-size:12.5px;font-weight:700;background:${S.lang===l?accent:"transparent"};color:${S.lang===l?"#fff":T.inkSoft};transition:all .18s">${l==="zh"?"繁中":"EN"}</button>`).join("")}
      </div>
    </div>
  </div>

  <!-- 比例切換 -->
  <div style="display:flex;gap:6px;margin-bottom:18px;align-items:center">
    <div style="font-size:11px;color:${T.inkMuted};font-family:${T.fM};margin-right:4px">比例</div>
    ${cat.ratios.map(r=>`<button class="ratio-btn" data-ratio="${r}"
      style="padding:4px 12px;border-radius:7px;font-size:11.5px;font-weight:700;border:1.5px solid ${curRatio===r?accent:T.border};background:${curRatio===r?pale:"#fff"};color:${curRatio===r?accent:T.inkMuted};font-family:${T.fM};transition:all .18s">${r}</button>`).join("")}
    <div style="font-size:11px;color:${T.inkMuted};margin-left:4px">· 此類別建議比例</div>
  </div>

  <!-- 進度條 -->
  ${li>=0?`<div style="margin-bottom:18px;display:flex;align-items:center;gap:10px">
    <div style="flex:1;height:4px;background:${T.border};border-radius:2px;overflow:hidden">
      <div style="height:100%;width:${prog}%;background:${accent};transition:width .4s ease;border-radius:2px"></div>
    </div>
    <div style="font-size:10.5px;color:${accent};font-weight:800;font-family:${T.fM};flex-shrink:0">${li+1}/${v.layers.length} 層已解鎖</div>
  </div>`:""}

  <!-- 主網格 -->
  <div id="main-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start">

    <!-- 左：提示詞預覽 -->
    <div style="position:sticky;top:20px">
      <div style="background:#fff;border:1.5px solid ${T.border};border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06)">
        <div style="height:4px;background:${accent}"></div>
        <div style="padding:12px 16px;border-bottom:1px solid ${T.border};display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap">
          <div>
            <div style="font-family:${T.fM};font-size:9.5px;color:${accent};letter-spacing:1.5px;font-weight:700">${li<0?"🔒 LOCKED":isDone?"✓ UNLOCKED":"⟳ REVEALING..."}</div>
            <div style="font-size:11px;font-weight:700;color:${T.ink};margin-top:2px">${v.title} <span style="color:${T.inkMuted};font-weight:400">· ${v.badge}</span></div>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            ${li>=0?`<button id="btn-exp" style="background:${T.tagBg};border:1px solid ${T.border};color:${T.inkSoft};padding:5px 10px;border-radius:6px;font-size:10.5px;font-weight:600">${S.expanded?"▲ 收合":"▼ 完整版"}</button>`:""}
            ${isDone?`<button id="btn-copy" style="background:${accent};border:none;color:#fff;padding:6px 12px;border-radius:7px;font-weight:800;font-size:11px">${S.copied?"✓ 已複製":"複製提示詞"}</button>`:""}
          </div>
        </div>
        <div style="padding:14px 16px;min-height:200px">${buildPreview()}</div>
      </div>
      <!-- 比例標示 -->
      <div style="margin-top:9px;display:flex;align-items:center;gap:8px">
        <span style="font-size:10.5px;padding:4px 10px;border-radius:7px;background:${pale};color:${accent};border:1px solid ${accent}44;font-weight:800">目前比例 ${curRatio}</span>
        ${isSaved?`<span style="font-size:10.5px;color:${accent};font-weight:700">♥ 已收藏</span>`:""}
      </div>
    </div>

    <!-- 右：拆解 -->
    <div style="display:flex;flex-direction:column;gap:9px">${buildLayers()}</div>
  </div>

  <!-- 底部返回按鈕（未完成時也顯示） -->
  ${!isDone?`<div style="margin-top:40px;text-align:center">
    <button id="btn-home-b" style="background:#fff;border:1.5px solid ${T.border};color:${T.inkSoft};padding:11px 24px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.06)">← 返回首頁</button>
  </div>`:""}

</div>
</div>
<style>
@media(max-width:680px){#main-grid{grid-template-columns:1fr!important}#main-grid>div:first-child{position:static!important}}
button:hover{opacity:.88}
</style>`;
}

// ═══ Events ══════════════════════════════════
function bind(){
  document.querySelectorAll(".cc").forEach(b=>{
    b.addEventListener("click",()=>{sfx.click();set({view:"category",catId:b.dataset.id,varIdx:0,layerIdx:-1,copied:false,expanded:false,ratio:null});});
    b.addEventListener("mouseenter",()=>{b.style.transform="translateY(-3px)";b.style.boxShadow="0 10px 26px rgba(0,0,0,.1)";});
    b.addEventListener("mouseleave",()=>{b.style.transform="";b.style.boxShadow="0 2px 10px rgba(0,0,0,.05)";});
  });
  ["btn-home","btn-home-b","btn-back-b"].forEach(id=>{
    const b=document.getElementById(id);if(b)b.addEventListener("click",()=>{sfx.click();set({view:"home"});});
  });
  const sb=document.getElementById("btn-start");if(sb)sb.addEventListener("click",()=>{sfx.reveal();set({layerIdx:0});});
  document.querySelectorAll(".btn-next").forEach(b=>b.addEventListener("click",()=>{
    const cat=CATS.find(c=>c.id===S.catId);
    const nxt=S.layerIdx+1;
    if(nxt<cat.variants[S.varIdx].layers.length){sfx.reveal();set({layerIdx:nxt});}
  }));
  document.querySelectorAll(".lang-btn").forEach(b=>b.addEventListener("click",()=>{sfx.click();set({lang:b.dataset.lang});}));
  document.querySelectorAll(".var-btn").forEach(b=>b.addEventListener("click",()=>{sfx.click();set({varIdx:+b.dataset.idx,layerIdx:-1,copied:false,expanded:false,ratio:null});}));
  document.querySelectorAll(".ratio-btn").forEach(b=>b.addEventListener("click",()=>{sfx.click();set({ratio:b.dataset.ratio});}));
  const eb=document.getElementById("btn-exp");if(eb)eb.addEventListener("click",()=>{sfx.click();set({expanded:!S.expanded});});
  const saveb=document.getElementById("btn-save");if(saveb)saveb.addEventListener("click",()=>{
    const key=`${S.catId}-${S.varIdx}`;
    const newSaved=new Set(S.saved);
    if(newSaved.has(key)){newSaved.delete(key);}else{newSaved.add(key);sfx.save();}
    set({saved:newSaved});
  });
  ["btn-copy","btn-copy-b"].forEach(id=>{
    const b=document.getElementById(id);if(!b)return;
    b.addEventListener("click",()=>{
      const cat=CATS.find(c=>c.id===S.catId);
      const v=cat?.variants[S.varIdx];
      if(v)copyText(S.lang==="zh"?v.fullZh:v.fullEn);
    });
  });
}

render();
</script>
</body>
</html>
